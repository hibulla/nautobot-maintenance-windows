---
name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-syntax:
    name: Lint and Syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Ruff
        run: python -m ruff check nautobot_maintenance_windows pyproject.toml

      - name: Compile Python sources
        run: python -m compileall nautobot_maintenance_windows

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs:
      - lint-and-syntax

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

  nautobot-integration:
    name: Nautobot Integration
    runs-on: ubuntu-latest
    needs:
      - lint-and-syntax

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nautobot
          POSTGRES_USER: nautobot
          POSTGRES_PASSWORD: nautobot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nautobot -d nautobot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build Nautobot image with app installed
        run: docker build --file development/Dockerfile.ci --tag nautobot-maintenance-windows-ci .

      - name: Run Nautobot system checks
        run: |
          docker run --rm --network host \
            --entrypoint bash \
            -e NAUTOBOT_DB_HOST=127.0.0.1 \
            -e NAUTOBOT_DB_NAME=nautobot \
            -e NAUTOBOT_DB_USER=nautobot \
            -e NAUTOBOT_DB_PASSWORD=nautobot \
            -e NAUTOBOT_REDIS_HOST=127.0.0.1 \
            nautobot-maintenance-windows-ci \
            -lc "nautobot-server check"

      - name: Run database migrations
        run: |
          docker run --rm --network host \
            --entrypoint bash \
            -e NAUTOBOT_DB_HOST=127.0.0.1 \
            -e NAUTOBOT_DB_NAME=nautobot \
            -e NAUTOBOT_DB_USER=nautobot \
            -e NAUTOBOT_DB_PASSWORD=nautobot \
            -e NAUTOBOT_REDIS_HOST=127.0.0.1 \
            nautobot-maintenance-windows-ci \
            -lc "nautobot-server migrate --no-input"

      - name: Run Nautobot app tests
        run: |
          docker run --rm --network host \
            --entrypoint bash \
            -e NAUTOBOT_DB_HOST=127.0.0.1 \
            -e NAUTOBOT_DB_NAME=nautobot \
            -e NAUTOBOT_DB_USER=nautobot \
            -e NAUTOBOT_DB_PASSWORD=nautobot \
            -e NAUTOBOT_REDIS_HOST=127.0.0.1 \
            nautobot-maintenance-windows-ci \
            -lc "nautobot-server test nautobot_maintenance_windows --keepdb"
